name: Weekly Preview (generate only)

# 주단위 7일치를 실제 이미지와 함께 생성·렌더하고 커밋만 한다(게시 없음).
# 미리보기 확인용. 수동 실행 전용.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weekly-post
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate weekly plan (7 days, with images)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python weekly.py generate

      - name: Commit weekly slides (preview)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/week
          git commit -m "chore: weekly preview $(date -u +%F)" || echo "nothing to commit"
          git push

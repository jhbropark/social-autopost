name: Generate Test

# Anthropic 크레딧/생성만 검증(게시 없음). 수동 실행.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install anthropic requests

      - name: Generate one post (no publish)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'PY'
          import re, generate
          d = generate.generate_posts()
          li = d.get("linkedin", {}).get("text", "")
          fb = d.get("facebook", {}).get("text", "")
          facts = d.get("carousel", {}).get("facts", [])
          print("OK topic:", d.get("topic"))
          print("ig:", (d.get("instagram", {}).get("caption", "")[:40]))
          print("--- LinkedIn ---")
          print(li[:400])
          print("--- facts ---", facts)
          # 지어낸 통계 의심 패턴 스캔(N명/N%/N배 등)
          risky = re.findall(r"\d[\d,\.]*\s*(?:명|%|퍼센트|배|억|만\s*명|만원|원)", li + " " + fb + " " + " ".join(facts))
          print("의심 수치:", risky if risky else "없음 ✅")
          ig = d.get("instagram", {}).get("caption", "")
          print("LI가 JSON래퍼로 시작:", li.strip().startswith("{"))
          print("'해시태그' 단어 노출:", ("해시태그" in li) or ("해시태그" in ig))
          PY

name: Telegram Test

# 실패 알림(원인 요약 → Telegram) 단독 검증. 가짜 실패 로그로 메시지 전송. 수동 실행.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests anthropic

      - name: Show available chat ids (진단)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python - <<'PY'
          import os, requests
          t = os.environ["TELEGRAM_BOT_TOKEN"]
          r = requests.get(f"https://api.telegram.org/bot{t}/getUpdates", timeout=30).json()
          seen = {}
          for u in r.get("result", []):
              msg = u.get("message") or u.get("channel_post") or {}
              ch = msg.get("chat") or {}
              if ch.get("id") is not None:
                  seen[ch["id"]] = f"{ch.get('type')} / {ch.get('title') or ch.get('first_name') or ch.get('username') or ''}"
          if seen:
              print("=== 사용 가능한 chat id (이 중 하나를 TELEGRAM_CHAT_ID 로 등록) ===")
              for cid, who in seen.items():
                  print(f"  chat_id = {cid}   ({who})")
          else:
              print("getUpdates 가 비어 있음 — 봇에게 메시지를 먼저 보낸 뒤 다시 실행하세요.")
          print("ok:", r.get("ok"), "| 업데이트 수:", len(r.get("result", [])))
          PY

      - name: Send test failure alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          printf '%s\n' "❌ instagram (테스트 주제): Facebook 9004: media download failed" "❌ facebook (테스트 주제): 400 invalid token" > _error.txt
          RUN_DATE=$(TZ=Asia/Seoul date +%F) python notify_failure.py

      - name: Send sample daily briefing
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import telegram_notify as tg
          text = ("☀️ <b>parkjunhyuk 데일리</b> · 테스트\n\n"
                  "오늘의 글 — <b>공간이 IP가 되는 구조</b>\n"
                  "✅Instagram · ✅LinkedIn · ✅Facebook")
          tg.send(text, buttons=[
              ("Instagram", "https://instagram.com/parkjunhyukxyz"),
              ("LinkedIn", "https://www.linkedin.com/in/"),
              ("Facebook", "https://facebook.com"),
          ])
          PY

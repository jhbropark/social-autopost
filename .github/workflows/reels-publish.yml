name: Reel Publish

# 이미 만들어진 out/reels/reel.mp4 를 인스타그램 릴스로 게시한다. 수동 실행 전용.
on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: reels-post
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Publish reel to Instagram
        env:
          IMAGE_BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/out/reels"
          CACHE_BUST: ${{ github.run_id }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python reels.py publish

name: Daily Social Post

on:
  schedule:
    # KST 09:00 == UTC 00:00 (매일). 시간을 바꾸려면 UTC 기준으로 수정.
    - cron: "0 0 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write          # 생성된 이미지를 커밋/푸시하기 위해 필요

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate content + media (IG 캐러셀1 + 릴스1 / LinkedIn 1 / FB 1)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          IG_POSTS_PER_DAY: "2"
          REELS_PER_DAY: "1"
          LINKEDIN_POSTS_PER_DAY: "1"
          # Ideas Pipeline 소재 연동(선택)
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_IDEAS_DB_ID: ${{ secrets.NOTION_IDEAS_DB_ID }}
          # Krea AI 표지 이미지 생성(선택) — 있으면 Pexels 대신 AI 생성
          KREA_API_KEY: ${{ secrets.KREA_API_KEY }}
          KREA_MODEL: ${{ secrets.KREA_MODEL }}
        run: python daily.py generate

      - name: Commit slides (make them publicly fetchable for Instagram)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/daily
          git commit -m "chore: daily posts $(date -u +%F)" || echo "nothing to commit"
          git push

      - name: Publish (IG 캐러셀1 + 릴스1 / LinkedIn 1 / FB 1)
        env:
          IMAGE_BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/out/daily"
          CACHE_BUST: ${{ github.run_id }}
          IG_POSTS_PER_DAY: "2"
          LINKEDIN_POSTS_PER_DAY: "1"
          FB_POSTS_PER_DAY: "1"
          # 자동 갱신(권장): refresh_token + client 자격증명
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          # 폴백(수동 60일 토큰) — 위 3개가 없을 때만 사용
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          # Instagram: INSTAGRAM_ACCESS_TOKEN(Instagram 로그인, 권장)이 있으면 그걸로 게시,
          # 없으면 FB 페이지 토큰으로 폴백. 두 경우 모두 IG_USER_ID 필요.
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          # Facebook 페이지 게시 + (IG 폴백 경로)
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          # Notion 콘텐츠 대시보드 기록(선택)
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          # Telegram 데일리 성공 브리핑(선택)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 뉴스레터 전환 퍼널(선택): 설정 시 FB 댓글 링크 + IG 캡션 CTA 가 뉴스레터로
          NEWSLETTER_URL: ${{ secrets.NEWSLETTER_URL }}
          # 댓글→DM 리드젠(선택): 설정 시 IG/릴스 캡션에 '댓글에 KEYWORD 남기면 DM' 추가
          LEADGEN_KEYWORD: ${{ secrets.LEADGEN_KEYWORD }}
        run: python daily.py publish

      # 발행 성공 시 콘텐츠를 검수해 결과를 Telegram 으로 발송
      - name: Content review (Telegram)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: RUN_DATE=$(TZ=Asia/Seoul date +%F) python review.py

      # 어느 단계든 실패하면 원인을 요약해 Telegram 으로 알림(설정 시)
      - name: Notify failure (Telegram)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          pip install requests anthropic >/dev/null 2>&1 || true
          RUN_DATE=$(TZ=Asia/Seoul date +%F) python notify_failure.py

name: Daily Social Post

on:
  schedule:
    # KST 09:00 == UTC 00:00 (매일). 시간을 바꾸려면 UTC 기준으로 수정.
    - cron: "0 0 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write          # 생성된 이미지를 커밋/푸시하기 위해 필요

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate content + media (1일 1게시물 — IG/LinkedIn/FB 각 1)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          IG_POSTS_PER_DAY: "1"
          REELS_PER_DAY: "0"
          LINKEDIN_POSTS_PER_DAY: "1"
        run: python daily.py generate

      - name: Commit slides (make them publicly fetchable for Instagram)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/daily
          git commit -m "chore: daily posts $(date -u +%F)" || echo "nothing to commit"
          git push

      - name: Publish (1일 1게시물 — IG/LinkedIn/FB 각 1)
        env:
          IMAGE_BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/out/daily"
          CACHE_BUST: ${{ github.run_id }}
          IG_POSTS_PER_DAY: "1"
          LINKEDIN_POSTS_PER_DAY: "1"
          FB_POSTS_PER_DAY: "1"
          # 자동 갱신(권장): refresh_token + client 자격증명
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          # 폴백(수동 60일 토큰) — 위 3개가 없을 때만 사용
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          # Instagram: INSTAGRAM_ACCESS_TOKEN(Instagram 로그인, 권장)이 있으면 그걸로 게시,
          # 없으면 FB 페이지 토큰으로 폴백. 두 경우 모두 IG_USER_ID 필요.
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          # Facebook 페이지 게시 + (IG 폴백 경로)
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: python daily.py publish

name: Facebook Test

# 페이스북 페이지 게시만 단독 검증. 수동 실행.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Post to Facebook page (photo + first-comment link)
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          IMG: "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/projects/sample/01.jpg"
        run: |
          python - <<'PY'
          import os, platforms
          text = ("나는 관람객을 30분 붙잡으려다, 오히려 5분 만에 내보낸 전시를 만든 적이 있다.\n\n"
                  "문제는 콘텐츠가 아니라 동선이었다. 사람은 '볼 것'이 아니라 '움직일 길'을 따라 머문다.\n\n"
                  "당신이 마지막으로 오래 머문 공간은, 무엇이 당신을 붙잡았나요?")
          print("FB:", platforms.post_facebook(text, image_url=os.environ["IMG"], link="https://parkjunhyuk.xyz"))
          PY

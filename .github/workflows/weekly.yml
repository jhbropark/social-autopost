name: Weekly Plan (test)

# 주단위(월~일 7일) 콘텐츠를 한 번에 생성하고 7일치를 모두 게시하는 테스트 워크플로우.
# 수동 실행 전용(workflow_dispatch). 자동 매일 게시는 daily.yml 이 담당.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weekly-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Korean fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate weekly plan (7 days)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python weekly.py generate

      - name: Commit weekly slides (public raw URLs for Instagram)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/week
          git commit -m "chore: weekly plan $(date -u +%F)" || echo "nothing to commit"
          git push

      - name: Publish all 7 days
        env:
          IMAGE_BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/out/week"
          CACHE_BUST: ${{ github.run_id }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: python weekly.py publish

name: LinkedIn Format Test

# 링크드인 포맷(doc/image/video) 게시 테스트. 수동 실행.
on:
  workflow_dispatch:
    inputs:
      format:
        description: "doc | image | video"
        required: true
        default: "doc"

permissions:
  contents: read

concurrency:
  group: linkedin-test
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Korean fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Post to LinkedIn (${{ inputs.format }})
        env:
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: python li_formats.py ${{ inputs.format }}

name: Image Preview

# 실제 소재로 콘텐츠 생성 + 이미지 렌더(게시 없음) → out/imgpreview 커밋. 수동 실행.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate + render images
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_IDEAS_DB_ID: ${{ secrets.NOTION_IDEAS_DB_ID }}
          KREA_API_KEY: ${{ secrets.KREA_API_KEY }}
          KREA_MODEL: ${{ secrets.KREA_MODEL }}
        run: python imgpreview.py

      - name: Commit preview images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/imgpreview
          git commit -m "chore: image preview $(date -u +%FT%TZ)" || echo "nothing to commit"
          git push

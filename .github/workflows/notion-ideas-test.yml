name: Notion Ideas Test

# Ideas Pipeline 연동 검증 — 아이디어 조회 + 그 아이디어로 콘텐츠 생성(게시 없음). 수동 실행.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests anthropic

      - name: Fetch ideas + generate from one
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_IDEAS_DB_ID: ${{ secrets.NOTION_IDEAS_DB_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'PY'
          import ideas, generate
          items = ideas.fetch_ideas()
          print("아이디어 수:", len(items))
          for it in items[:6]:
              print("  -", it["idea"], "|", it.get("stage"), "|", ", ".join(it.get("format", [])))
          if not items:
              print("RESULT: ❌ 0개 — DB가 통합과 공유됐는지/ID가 맞는지 확인 필요")
          else:
              picked = ideas.pick_idea(0)
              print("\n선택 소재:", picked["idea"])
              d = generate.generate_posts(idea=picked)
              print("생성 topic:", d.get("topic"))
              print("IG:", d.get("instagram", {}).get("caption", "")[:80])
              print("RESULT: ✅ 아이디어 기반 생성 성공")
          PY
